<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>WebSocket чат</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 800px;
      margin: 30px auto;
      padding: 20px;
    }

    h2 {
      text-align: center;
    }

    #messages {
      border: 1px solid #ccc;
      height: 300px;
      overflow-y: auto;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 8px;
    }

    .controls {
      display: flex;
      gap: 10px;
    }

    #input {
      flex: 1;
      padding: 8px;
    }

    button {
      padding: 8px 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <h2>💬 Простий WebSocket чат</h2>

  <div id="messages"></div>

  <div class="controls">
    <input
      id="input"
      type="text"
      placeholder="Введіть повідомлення..."
    >

    <button id="send">
      Надіслати
    </button>
  </div>

  <script>
    const ws = new WebSocket('ws://localhost:8080');

    const messages = document.getElementById('messages');
    const input = document.getElementById('input');
    const button = document.getElementById('send');

    ws.onmessage = (event) => {
      const div = document.createElement('div');

      div.textContent = event.data;

      messages.appendChild(div);

      messages.scrollTop = messages.scrollHeight;
    };

    button.onclick = sendMessage;

    input.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') {
        sendMessage();
      }
    });

    function sendMessage() {
      const text = input.value.trim();

      if (!text) {
        return;
      }

      ws.send(text);

      input.value = '';
      input.focus();
    }
  </script>

</body>
</html>
